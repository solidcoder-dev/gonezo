services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gonezo
      POSTGRES_USER: gonezo
      POSTGRES_PASSWORD: gonezo
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gonezo
      SPRING_DATASOURCE_USERNAME: gonezo
      SPRING_DATASOURCE_PASSWORD: gonezo
    ports:
      - "8080:8080"

volumes:
  db_data:
