server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gonezo}
    username: ${SPRING_DATASOURCE_USERNAME:gonezo}
    password: ${SPRING_DATASOURCE_PASSWORD:gonezo}
  flyway:
    enabled: true
    locations: classpath:db/migration
